name: Publish to PyPI

# Triggers:
#   - Push a tag like v0.2.0 to cut a release and upload to PyPI.
#   - Push / PR to main to verify the package still builds (no upload).
#
# Uses PyPI Trusted Publishing (OIDC) — no API token needs to live in
# GitHub Secrets. One-time setup on PyPI is described in README.md.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history (hatch-vcs needs tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Show artefacts
        run: ls -la dist/

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only run on tag pushes, not on regular commits / PRs.
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/visual-annotation-mcp
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
